{% extends "base.html" %}
{% block content %}
<h1>编辑发票 #{{ item.id }}</h1>

<div class="card">
  <form method="post" class="form-grid two-col">
    <label>收票日期</label>
    <input type="date" name="receipt_date" value="{{ item.receipt_date or '' }}">

    <label>交票人</label>
    <input type="text" name="submitter_name" value="{{ item.submitter_name or current_user.name }}">

    <label>PDF文档名称</label>
    <input type="text" name="pdf_filename" value="{{ item.pdf_filename or '' }}">

    <label>开票日期</label>
    <input type="date" name="invoice_date" value="{{ item.invoice_date or '' }}">

    <label>发票号码 *</label>
    <input type="text" name="invoice_no" value="{{ item.invoice_no }}" required>

    <label>购买方信息名称</label>
    <input type="text" name="buyer_name" value="{{ item.buyer_name or '' }}">

    <label>购买方统一社会信用代码</label>
    <input type="text" name="buyer_tax_no" value="{{ item.buyer_tax_no or '' }}">

    <label>销售方信息名称</label>
    <input type="text" name="seller_name" value="{{ item.seller_name or '' }}">

    <label>销售方统一社会信用代码</label>
    <input type="text" name="seller_tax_no" value="{{ item.seller_tax_no or '' }}">

    <label>金额 *</label>
    <input type="number" step="0.01" name="amount" value="{{ item.amount }}" required>

    <label>项目名称</label>
    <input type="text" name="project_name" value="{{ item.project_name or '' }}">

    <label>开票类型 *</label>
    <select name="invoice_type_id" required>
      {% for t in invoice_types %}
      <option value="{{ t.id }}" {% if item.invoice_type_id == t.id %}selected{% endif %}>{{ t.type_name }}</option>
      {% endfor %}
    </select>

    <div class="full">
      <button class="btn primary" type="submit">保存修改</button>
    </div>
  </form>
</div>
{% endblock %}
