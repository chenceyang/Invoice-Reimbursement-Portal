{% extends "base.html" %}
{% block content %}
<h1>{{ title }}</h1>

<div class="actions">
  <a class="btn {{ 'primary' if is_invoice_type else '' }}" href="{{ url_for('admin.invoice_type_settings') }}">发票事项</a>
  <a class="btn {{ 'primary' if not is_invoice_type else '' }}" href="{{ url_for('admin.reimburse_item_settings') }}">核销事项</a>
  <a class="btn" href="{{ url_for('admin.reimburse') }}">返回核销</a>
</div>

<div class="card">
  <h2>新增{{ item_label }}</h2>
  <form method="post" class="filter-form">
    <div class="filter-grid">
      <div>
        <label>名称</label>
        <input type="text" name="item_name" maxlength="100" required placeholder="请输入{{ item_label }}名称">
      </div>
    </div>
    <div class="filter-actions">
      <button class="btn primary" type="submit">添加</button>
    </div>
  </form>
</div>

<div class="card">
  <h2>{{ list_title }}</h2>
  <table class="table">
    <thead>
      <tr><th>ID</th><th>名称</th><th>状态</th><th>操作</th></tr>
    </thead>
    <tbody>
      {% for item in items %}
      <tr>
        <td>{{ item.id }}</td>
        <td>{{ item.item_name }}</td>
        <td>{{ '启用' if item.is_active else '停用' }}</td>
        <td>
          <form method="post" action="{{ url_for('admin.toggle_item') }}">
            <input type="hidden" name="item_kind" value="{{ item_kind }}">
            <input type="hidden" name="item_id" value="{{ item.id }}">
            <button class="btn small" type="submit">{{ '停用' if item.is_active else '启用' }}</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="4" class="muted">暂无{{ item_label }}</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
