{% extends "base.html" %}
{% block content %}
<div class="card auth-card">
  <h1>员工登录</h1>
  <form method="post" class="form-grid">
    <label>工号</label>
    <input type="text" name="employee_no" placeholder="例如 E1001" required>
    <label>密码</label>
    <input type="password" name="password" placeholder="请输入密码" required>
    <button class="btn primary" type="submit">登录</button>
  </form>
  <p class="hint">演示账号：E1001 / 123456　管理员：A0001 / 123456</p>
</div>
{% endblock %}
