{% extends "base.html" %}
{% block content %}
<h1>登记发票</h1>

<div class="card">
  <h2>第一步：上传发票图片 / PDF 并自动识别</h2>
  <form method="post" enctype="multipart/form-data" class="inline-form">
    <input type="hidden" name="action" value="upload">
    <input type="file" name="invoice_file" accept=".pdf,.png,.jpg,.jpeg" required>
    <button class="btn primary" type="submit">上传并识别</button>
  </form>
  <p class="hint">支持 PDF、PNG、JPG、JPEG。上传后系统会自动识别并回填下方字段。</p>
</div>

<div class="card">
  <h2>第二步：检查并提交发票信息</h2>

  {% if ocr.file_path %}
    {% set preview_url = url_for('uploaded_file', filename=ocr.file_path) %}
    <div style="margin-bottom:16px;">
      <button type="button" class="btn" onclick="openInvoicePreview('{{ preview_url }}', '{{ 'pdf' if ocr.pdf_filename and ocr.pdf_filename.lower().endswith('.pdf') else 'img' }}')">
        点击查看发票预览
      </button>
      <span class="hint" style="margin-left:8px;">当前文件：{{ ocr.pdf_filename }}</span>
    </div>
  {% endif %}

  <form method="post" class="form-grid two-col">
    <input type="hidden" name="action" value="submit">
    <input type="hidden" name="file_path" value="{{ ocr.file_path or '' }}">

    <label>收票日期</label>
    <input type="date" name="receipt_date" value="{{ ocr.receipt_date or '' }}">

    <label>交票人</label>
    <input type="text" name="submitter_name" value="{{ ocr.submitter_name or current_user.name }}" class="readonly" readonly>

    <label>PDF文档名称</label>
    <input type="text" name="pdf_filename" value="{{ ocr.pdf_filename or '' }}" class="readonly" readonly>

    <label>开票日期</label>
    <input type="date" name="invoice_date" value="{{ ocr.invoice_date or '' }}">

    <label>发票号码 *</label>
    <input type="text" name="invoice_no" value="{{ ocr.invoice_no or '' }}" required>

    <label>购买方信息名称</label>
    <input type="text" name="buyer_name" value="{{ ocr.buyer_name or '' }}">

    <label>销售方信息名称</label>
    <input type="text" name="seller_name" value="{{ ocr.seller_name or '' }}">

    <label>金额（取价税合计小写）*</label>
    <input type="number" step="0.01" name="amount" value="{{ ocr.amount or '' }}" required>

    <label>项目名称</label>
    <input type="text" name="project_name" value="{{ ocr.project_name or '' }}">

    <label>开票类型 *</label>
    <select name="invoice_type_id" required>
      <option value="">请选择</option>
      {% for t in invoice_types %}
      <option value="{{ t.id }}" {% if ocr.invoice_type_id|string == t.id|string %}selected{% endif %}>{{ t.type_name }}</option>
      {% endfor %}
    </select>

    <div class="full">
      <button class="btn primary" type="submit">提交发票</button>
    </div>
  </form>
</div>

<!-- 发票预览弹窗 -->
<div id="invoicePreviewModal" class="invoice-modal" style="display:none;">
  <div class="invoice-modal-mask" onclick="closeInvoicePreview()"></div>

  <div class="invoice-modal-dialog">
    <div class="invoice-modal-header">
      <div class="invoice-modal-title">发票预览</div>
      <button type="button" class="invoice-modal-close" onclick="closeInvoicePreview()">×</button>
    </div>

    <div class="invoice-modal-body" id="invoicePreviewBody">
      <!-- JS 动态插入 iframe / img -->
    </div>
  </div>
</div>

<script>
  function openInvoicePreview(url, type) {
    const modal = document.getElementById("invoicePreviewModal");
    const body = document.getElementById("invoicePreviewBody");

    if (type === "pdf") {
      body.innerHTML = `<iframe src="${url}" class="invoice-modal-frame"></iframe>`;
    } else {
      body.innerHTML = `<img src="${url}" alt="发票预览" class="invoice-modal-image">`;
    }

    modal.style.display = "block";
    document.body.style.overflow = "hidden";
  }

  function closeInvoicePreview() {
    const modal = document.getElementById("invoicePreviewModal");
    const body = document.getElementById("invoicePreviewBody");
    modal.style.display = "none";
    body.innerHTML = "";
    document.body.style.overflow = "";
  }

  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
      closeInvoicePreview();
    }
  });
</script>
{% endblock %}
